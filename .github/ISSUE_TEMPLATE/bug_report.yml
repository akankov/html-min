name: Bug report
description: Report incorrect output, parser failure, or runtime error.
title: "Bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include the smallest HTML sample that reproduces the problem.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I have searched existing issues.
          required: true
        - label: This is not a security vulnerability. I will use SECURITY.md for security reports.
          required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Run `composer show akankov/html-min` or provide the commit SHA.
      placeholder: "1.0.0 or abc1234"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "8.3.12"
    validations:
      required: true

  - type: textarea
    id: options
    attributes:
      label: Minifier configuration
      description: Include the options you set, or write "defaults".
      placeholder: "defaults"
      render: php
    validations:
      required: true

  - type: textarea
    id: input-html
    attributes:
      label: Input HTML
      description: Smallest HTML sample that reproduces the problem.
      render: html
    validations:
      required: true

  - type: textarea
    id: actual-output
    attributes:
      label: Actual output
      render: html
    validations:
      required: true

  - type: textarea
    id: expected-output
    attributes:
      label: Expected output
      render: html
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add stack traces, parser warnings, benchmark data, or links if relevant.

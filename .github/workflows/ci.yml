name: CI

on:
  push:
    branches: [master, "rebrand/v1"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  tests:
    name: PHP ${{ matrix.php }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.3", "8.4", "8.5"]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: dom, libxml, mbstring
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        run: vendor/bin/phpunit

  static-analysis:
    name: PHPStan (level max)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: dom, libxml, mbstring
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  phan:
    name: Phan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: dom, libxml, mbstring, ast
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Phan
        run: vendor/bin/phan --no-progress-bar

  code-style:
    name: PHP-CS-Fixer
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: dom, libxml, mbstring
          tools: composer:v2

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style (library + benchmarks)
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  benchmarks-tests:
    name: Benchmarks PHPUnit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: dom, libxml, mbstring, zlib
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: composer-benchmarks-${{ hashFiles('benchmarks/composer.json') }}
          restore-keys: composer-benchmarks-

      - name: Install benchmarks dependencies
        working-directory: benchmarks
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        working-directory: benchmarks
        run: vendor/bin/phpunit

  benchmarks-static-analysis:
    name: Benchmarks PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: dom, libxml, mbstring
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/composer
          key: composer-benchmarks-${{ hashFiles('benchmarks/composer.json') }}
          restore-keys: composer-benchmarks-

      - name: Install benchmarks dependencies
        working-directory: benchmarks
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        working-directory: benchmarks
        run: vendor/bin/phpstan analyse --no-progress
